openapi: 3.0.3
info:
  title: Salesforce Tooling API
  description: |
    Salesforce Tooling API for metadata operations and development tools.
    This specification includes endpoints for creating managed event subscriptions.
  version: 1.0.0
  contact:
    name: Salesforce Developers
    url: https://developer.salesforce.com

servers:
  - url: https://{instance}.salesforce.com/services/data/v{apiVersion}/tooling
    description: Salesforce Tooling API instance
    variables:
      instance:
        default: yourinstance.my.salesforce
        description: Your Salesforce instance domain
      apiVersion:
        default: "65.0"
        description: Salesforce API version

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 Bearer token

  schemas:
    ReplayPreset:
      type: string
      enum:
        - LATEST
        - EARLIEST
      description: Replay preset for managed event subscriptions

    SubscriptionState:
      type: string
      enum:
        - RUN
        - STOP
      description: State of a managed event subscription

    ManagedEventSubscriptionMetadata:
      type: object
      required:
        - label
        - topicName
        - defaultReplay
        - state
        - errorRecoveryReplay
      properties:
        label:
          type: string
          description: Human-readable label for the subscription
          example: "Managed Sub OpportunityChangeEvent"
        topicName:
          type: string
          description: Topic name to subscribe to
          example: "/data/OpportunityChangeEvent"
        defaultReplay:
          $ref: '#/components/schemas/ReplayPreset'
        state:
          $ref: '#/components/schemas/SubscriptionState'
        errorRecoveryReplay:
          $ref: '#/components/schemas/ReplayPreset'

    CreateManagedEventSubscriptionRequest:
      type: object
      required:
        - FullName
        - Metadata
      properties:
        FullName:
          type: string
          description: Full API name of the managed event subscription
          example: "Managed_Sub_OpportunityChangeEvent"
        Metadata:
          $ref: '#/components/schemas/ManagedEventSubscriptionMetadata'

    ToolingApiError:
      type: object
      required:
        - message
      properties:
        statusCode:
          type: string
          description: Error status code identifier (optional, not always present)
          example: "INVALID_FIELD"
        errorCode:
          type: string
          description: Error code identifier (alternative to statusCode)
          example: "EXCEEDED_ID_LIMIT"
        message:
          type: string
          description: Descriptive error message
          example: "Invalid topic name"
        fields:
          type: array
          description: Fields that caused the error
          items:
            type: string
          example: ["topicName"]

    CreateManagedEventSubscriptionResponse:
      type: object
      required:
        - id
        - success
      properties:
        id:
          type: string
          description: Salesforce ID of the created subscription
          example: "0Xaxx000000001AAA"
        success:
          type: boolean
          description: Whether the operation succeeded
          example: true
        errors:
          type: array
          description: List of errors (empty on success)
          items:
            $ref: '#/components/schemas/ToolingApiError'
          default: []

paths:
  /sobjects/ManagedEventSubscription:
    post:
      summary: Create Managed Event Subscription
      description: |
        Creates a new ManagedEventSubscription metadata record. This allows
        you to subscribe to platform events or change data capture events
        using the Pub/Sub API's managed_subscribe() method.
      operationId: createManagedEventSubscription
      tags:
        - ManagedEventSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedEventSubscriptionRequest'
            example:
              FullName: "Managed_Sub_OpportunityChangeEvent"
              Metadata:
                label: "Managed Sub OpportunityChangeEvent"
                topicName: "/data/OpportunityChangeEvent"
                defaultReplay: "LATEST"
                state: "RUN"
                errorRecoveryReplay: "LATEST"
      responses:
        '200':
          description: Managed event subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateManagedEventSubscriptionResponse'
              example:
                id: "0Xaxx000000001AAA"
                success: true
                errors: []
        '400':
          description: Bad request (invalid input or missing required fields)
        '401':
          description: Unauthorized (invalid or missing access token)
        '403':
          description: Forbidden (insufficient permissions to create metadata)

tags:
  - name: ManagedEventSubscription
    description: Operations for creating and managing ManagedEventSubscription metadata
